name: "🐛 Bug Report"
description: Something is not working as expected.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I call `github_build_profile()`, it returns..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      value: |
        1. Configure `.env` with ...
        2. Call `...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Paste any error messages or tracebacks.
      render: text
    validations:
      required: true

  - type: dropdown
    id: tool
    attributes:
      label: Affected Tool
      options:
        - linkedin_ingest_archive
        - github_build_profile
        - coding_extract_profiles
        - resume_history_analyze
        - server.py / env_loader.py
        - Other / Unknown
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python Version
      placeholder: "e.g. 3.11.4"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Windows 11, Ubuntu 22.04, macOS 14"
    validations:
      required: true
